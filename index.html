<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTALBEY | Cengiz Topel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #c00000; 
            --secondary: #1a1a1a; 
            --bg: #f8f8f8; 
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 140px; color: var(--secondary); }

        /* --- HEADER --- */
        .top-header { 
            text-align: center; padding: 30px 20px; background: #fff; 
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .brand-logo { width: 90px; height: auto; margin-bottom: 10px; }
        .brand-name { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-transform: uppercase; display: block; }
        .sub-title { font-size: 0.8rem; color: #666; font-weight: 700; display: block; }

        /* --- GRID --- */
        .section-label { padding: 20px; font-weight: 800; color: var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .cat-card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid #eee;
        }
        .cat-card i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; display: block; }
        .cat-card span { font-size: 0.75rem; font-weight: 800; }

        /* --- DETAY --- */
        #detail-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; }
        .detail-header { position: sticky; top: 0; background: #fff; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; z-index: 2100; }
        .back-btn { font-size: 1.5rem; border: none; background: none; color: var(--primary); margin-right: 15px; }

        /* --- ÜRÜN --- */
        .item { padding: 15px 20px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; }
        .item img { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; margin-right: 15px; background: #eee; }
        .item-info { flex: 1; }
        .item h3 { margin: 0 0 5px; font-size: 0.9rem; font-weight: 700; }
        .item p { margin: 0; font-size: 0.7rem; color: #888; }
        .price { color: var(--primary); font-weight: 800; font-size: 1.1rem; margin-top: 8px; }
        .add-btn { background: var(--primary); color: #fff; width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* --- FOOTER --- */
        #cart-bar { position: fixed; bottom: 90px; left: 15px; right: 15px; background: var(--secondary); color: #fff; padding: 15px; border-radius: 15px; display: none; justify-content: space-between; align-items: center; z-index: 3000; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; z-index: 4000; }
        .nav-item { text-align: center; color: #999; font-size: 0.7rem; text-decoration: none; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="top-header">
            <img src="logo.png" class="brand-logo" onerror="this.style.display='none'">
            <span class="brand-name">BATTALBEY</span>
            <span class="sub-title">CENGİZ TOPEL ŞUBESİ</span>
        </div>
        <div class="section-label">KATEGORİLER</div>
        <div class="grid">
            <div class="cat-card" onclick="openCat('durumler')"><i class="fas fa-wrapped-gift"></i><span>DÜRÜMLER</span></div>
            <div class="cat-card" onclick="openCat('porsiyonlar')"><i class="fas fa-plate-wheat"></i><span>PORSİYONLAR</span></div>
            <div class="cat-card" onclick="openCat('ciger')"><i class="fas fa-fire-alt"></i><span>CİĞER</span></div>
            <div class="cat-card" onclick="openCat('menuler')"><i class="fas fa-layer-group"></i><span>MENÜLER</span></div>
            <div class="cat-card" onclick="openCat('icecekler')"><i class="fas fa-bottle-water"></i><span>İÇECEKLER</span></div>
        </div>
    </div>

    <div id="detail-screen">
        <div class="detail-header">
            <button class="back-btn" onclick="closeCat()"><i class="fas fa-chevron-left"></i></button>
            <span id="cat-title">MENÜ</span>
        </div>
        <div id="item-list"></div>
    </div>

    <div id="cart-bar">
        <span id="cart-total" style="font-weight: 800;">0₺</span>
        <a href="https://wa.me/905368940942" style="color:white; text-decoration:none; font-weight:800;">SİPARİŞ VER</a>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="closeCat()"><i class="fas fa-utensils"></i>Menü</div>
        <a href="https://wa.me/905368940942" class="nav-item" style="color:#25d366"><i class="fab fa-whatsapp"></i>WhatsApp</a>
        <a href="#" class="nav-item"><i class="fas fa-location-dot"></i>Konum</a>
    </div>

    <script>
        const data = {
            durumler: [
                {n:"Öğrenci Dürüm (80g)", d:"Özel sos, yeşillik, turşu", p:"70₺", i: "img/durum.jpg"},
                {n:"Normal Dürüm (100g)", d:"Battalbey klasiği", p:"85₺", i: "img/durum.jpg"},
                {n:"Double Dürüm (120g)", d:"Çift lavaş lezzeti", p:"95₺", i: "img/durum.jpg"},
                {n:"Mega Dürüm (150g)", d:"Doyurucu dev porsiyon", p:"110₺", i: "img/durum.jpg"},
                {n:"Doritoslu Normal (100g)", d:"Çıtır Doritos Taco parçalı", p:"95₺", i: "img/durum.jpg"},
                {n:"Doritoslu Mega (150g)", d:"Mega lezzet, ekstra çıtır", p:"115₺", i: "img/durum.jpg"}
            ],
            porsiyonlar: [
                {n:"Porsiyon Çiğköfte (200g)", d:"Lavaş ve garnitür ile", p:"160₺", i: "img/porsiyon.jpg"},
                {n:"Double Porsiyon (400g)", d:"Geniş garnitür tabağı", p:"230₺", i: "img/porsiyon.jpg"},
                {n:"Yarım Kilo Çiğköfte", d:"500g + tam garnitür", p:"260₺", i: "img/porsiyon.jpg"},
                {n:"Mega Porsiyon (750g)", d:"Kalabalık gruplar için", p:"350₺", i: "img/porsiyon.jpg"},
                {n:"1 Kilo Tam Porsiyon", d:"Battalbey şöleni", p:"475₺", i: "img/porsiyon.jpg"},
                {n:"1 Kilo Sade", d:"Garnitürsüz vakumlu", p:"400₺", i: "img/porsiyon.jpg"}
            ],
            ciger: [
                {n:"Ciğer Lavaş Dürüm", d:"Özel soslu ciğer", p:"100₺", i: "img/ciger.jpg"},
                {n:"Ciğer Somun Dürüm", d:"Taze somun ekmeğinde", p:"80₺", i: "img/ciger.jpg"}
            ],
            menuler: [
                {n:"Öğrenci Menü", d:"Dürüm + Küçük Ayran", p:"120₺", i: "img/menu.jpg"},
                {n:"Kola Menü", d:"Dürüm + Kola", p:"115₺", i: "img/menu.jpg"},
                {n:"Ciğer Lavaş Menü", d:"Ciğer + Ayran", p:"110₺", i: "img/menu.jpg"}
            ],
            icecekler: [
                {n:"Küçük/Yayık Ayran", d:"Soğuk ve taze", p:"20₺", i: "img/ayran.jpg"},
                {n:"Büyük Ayran", d:"300ml", p:"30₺", i: "img/ayran.jpg"},
                {n:"Şalgam Suyu", d:"Acılı/Acısız", p:"30₺", i: "img/icecek.jpg"},
                {n:"Kola Çeşitleri", d:"Siyah/Sarı", p:"40₺", i: "img/icecek.jpg"},
                {n:"Su", d:"500ml", p:"10₺", i: "img/su.jpg"}
            ]
        };

        let cartTotal = 0;
        function openCat(cat) {
            const list = document.getElementById('item-list');
            list.innerHTML = '';
            document.getElementById('cat-title').innerText = cat.toUpperCase();
            data[cat].forEach(item => {
                list.innerHTML += `
                    <div class="item">
                        <img src="${item.i}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081093.png'">
                        <div class="item-info">
                            <h3>${item.n}</h3>
                            <p>${item.d}</p>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div class="price">${item.p}</div>
                                <div class="add-btn" onclick="addToCart('${item.p}')">+</div>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('detail-screen').style.display = 'block';
        }
        function closeCat() { document.getElementById('detail-screen').style.display = 'none'; }
        function addToCart(p) {
            cartTotal += parseInt(p);
            document.getElementById('cart-bar').style.display = 'flex';
            document.getElementById('cart-total').innerText = cartTotal + '₺';
        }
    </script>
</body>
</html>
